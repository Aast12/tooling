name = "filebundle-sweep"
main = "index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[[r2_buckets]]
binding = "FILES"
bucket_name = "filebundle"

[[d1_databases]]
binding = "DB"
database_name = "filebundle"
database_id = "REPLACE_WITH_REAL_ID_AFTER_TERRAFORM_APPLY"

[triggers]
crons = ["0 * * * *"]

[observability]
enabled = true
