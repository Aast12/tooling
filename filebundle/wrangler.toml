name = "filebundle"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

routes = [
  { pattern = "files.alamst.me", custom_domain = true },
]

[[r2_buckets]]
binding = "FILES"
bucket_name = "filebundle"
preview_bucket_name = "filebundle-preview"

[[d1_databases]]
binding = "DB"
database_name = "filebundle"
database_id = "d5d5064d-814f-4025-ae59-e762a2fe96ae"
migrations_dir = "migrations"

# Used both by Astro's session feature (transparently) and by the KV-backed
# login rate limiter in src/lib/ratelimit.ts. Without this binding in
# production, /api/login throws on `e.SESSION.get(...)` and returns 500.
# Create with: `wrangler kv namespace create SESSION` and paste the id below.
[[kv_namespaces]]
binding = "SESSION"
id = "dce90cfffcdf42fcb55a03f8341d5881"

[observability]
enabled = true

# Secrets (set via `wrangler secret put`):
#   UPLOAD_PASSWORD
#   SESSION_SECRET
#   POSTHOG_API_KEY    (optional — enables server-side analytics)
#   POSTHOG_HOST       (optional — defaults to https://us.i.posthog.com; use https://eu.i.posthog.com for EU)
