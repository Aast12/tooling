name = "filebundle"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

routes = [
  { pattern = "files.alamst.me", custom_domain = true },
]

[[r2_buckets]]
binding = "FILES"
bucket_name = "filebundle"
preview_bucket_name = "filebundle-preview"

[[d1_databases]]
binding = "DB"
database_name = "filebundle"
database_id = "d5d5064d-814f-4025-ae59-e762a2fe96ae"
migrations_dir = "migrations"

[[ratelimits]]
name = "LOGIN_LIMITER"
namespace_id = "1001"
simple = { limit = 5, period = 60 }

[observability]
enabled = true

# Secrets (set via `wrangler secret put`):
#   UPLOAD_PASSWORD
#   SESSION_SECRET
